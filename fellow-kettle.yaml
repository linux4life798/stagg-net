esphome:
  name: fellow-kettle
  friendly_name: Fellow Water Kettle

# https://www.sparkfun.com/sparkfun-qwiic-pocket-development-board-esp32-c6.html
esp32:
  board: sparkfun_qwiic_pocket_esp32c6 # 4MB
  # Optionally, you can describe using variant and explicit specs.
  # variant: esp32c6
  # flash_size: 4MB
  # cpu_frequency: 160MHz
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "please-replace-with-something-valid"

ota:
  - platform: esphome
    password: "please-replace-with-something-valid"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Fellow-Kettle Fallback Hotspot"
    password: "please-replace-with-something-valid"

captive_portal:

# Enabled web server on Dec 8, 2025
web_server:
  port: 80
  include_internal: true

# https://esphome.io/components/uart/
uart:
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 9600

# https://esphome.io/components/sensor/adc/
# https://esphome.io/components/sensor/ntc/
sensor:
  - platform: adc
    pin: GPIO2
    name: "Water Temperature"
    id: water_temp
    update_interval: 5s
    # unit_of_measurement: "°C"
    # filters:
    #   - lambda: return 27 - (x - 0.706f) / 0.001721f;

# Example configuration entry
output:
  - platform: gpio
    id: out_button_on_off
    pin:
      number: GPIO18
      allow_other_uses: True
      inverted: true
      mode:
        output: True
        open_drain: True
        input: True

button:
  - platform: output
    name: "On/Off Button"
    id: button_on_off
    output: out_button_on_off
    duration: 100ms
    icon: mdi:kettle-pour-over

  # - platform: template
  #   name: "Button Program"
  #   id: button_program
  #   # output: out_button_on_off
  #   # duration: 1000ms
  #   icon: mdi:alpha-p-circle
  #   on_press:
  #     then:
  #       - output.turn_on: out_button_on_off
  #       - logger.log: "Wait for LED to turn on."
  #       - wait_until:
  #           condition:
  #             binary_sensor.is_on: status_led
  #           timeout: 8s
  #       - output.turn_off: out_button_on_off
  #       - logger.log: "Ready to program"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
      mode:
        input: True
        # pullup: True
      allow_other_uses: True
      inverted: True
    name: "Button Status"
    id: button_status
    #icon: "mdi:led-on"
    publish_initial_state: True

  - platform: gpio
    pin:
      number: GPIO19
      mode:
        input: True
        # pullup: True
      # allow_other_uses: True
      inverted: True
    name: "Backlight Status"
    id: status_led
    icon: "mdi:led-on"
    publish_initial_state: True
